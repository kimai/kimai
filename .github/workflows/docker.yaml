name: 'Docker Build'

on:
    workflow_dispatch:
        inputs:
            kimai_tag:
                description: 'Kimai tag to build'
                required: true
    release:
        types: [released]

concurrency:
    group: docker-build
    cancel-in-progress: true

permissions: {}

jobs:
    build:
        name: Docker images
        runs-on: ubuntu-latest
        steps:
            - name: Determine version
              env:
                  GITHUB_EVENT_INPUTS_KIMAI_TAG: ${{ github.event.inputs.kimai_tag }}
                  GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
              run: |
                  input="${GITHUB_EVENT_INPUTS_KIMAI_TAG}"

                  # Determine between manual trigger and release event
                  if [ -z "$input" ]; then
                      echo "Using release tag: ${GITHUB_EVENT_RELEASE_TAG_NAME}"
                      version="${GITHUB_EVENT_RELEASE_TAG_NAME}"
                  else
                      echo "Using tag provided: $input"
                      version="$input"
                  fi

                  if [[ ! $version =~ ^2\.(0|[1-9]*)(0?)\.(0|[0-9]*)(0?)$ ]]; then
                    echo "Invalid version number: $version"
                    exit 1
                  fi

                  echo "kimai_version=$version" >> $GITHUB_ENV

            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ env.kimai_version }}
                  persist-credentials: false

            - name: Install buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Login to DockerHub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{secrets.DOCKERHUB_USERNAME}}
                  password: ${{secrets.DOCKERHUB_PASSWORD}}

            # TODO 3.0 remove kimai/kimai2:apache and kimai/kimai2:apache-<version>
            - name: Apache image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: Dockerfile
                  build-args: |
                      KIMAI=${{ env.kimai_version }}
                      BASE=apache
                  target: prod
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      kimai/kimai2:stable
                      kimai/kimai2:apache
                      kimai/kimai2:2
                      kimai/kimai2:${{ env.kimai_version }}
                  push: true

            # TODO 3.0 remove the deprecated FPM build
            - name: FPM image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: Dockerfile
                  build-args: |
                      KIMAI=${{ env.kimai_version }}
                      BASE=fpm
                  target: prod
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      kimai/kimai2:latest
                      kimai/kimai2:fpm
                  push: true

            - name: Development image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: Dockerfile
                  build-args: |
                      KIMAI=${{ env.kimai_version }}
                      BASE=apache
                  target: dev
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      kimai/kimai2:dev
                  push: true
